<div class="ticket-card">
    <div class="status">
        <i class="fas {{ statusTextMap.get(devTicket.status.id)?.icon }} {{ statusTextMap.get(devTicket.status.id)?.color }}"></i> 
        <span class="{{ statusTextMap.get(devTicket.status.id)?.color }} hidden md:inline">&nbsp;{{ devTicket.status.name }}</span>
    </div>
    <div class="co-date">
        {{ statusCorrespondingDate | date:'MMM yy'  }}
    </div>
    <div 
        class="title clickable"
        (click)="doClick()"> 
        {{ devTicket.title }} 
    </div>
    <div class="priority">
        <app-badge [colorProfile]="priorityColorMap.get(devTicket.priority.id) ?? 'default'">
            {{ devTicket.priority.name }}
        </app-badge>
    </div>
</div>
